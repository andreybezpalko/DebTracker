<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Деталі кредиту — Loan Tracker</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">← Назад</a>
  <span style="font-size:15px;font-weight:600" id="page-title">Кредит</span>
  <div class="header-actions">
    <button class="theme-toggle" id="theme-toggle" title="Змінити тему">🌙</button>
    <span class="btn btn-ghost btn-sm" id="header-badge" style="cursor:default"></span>
    <button class="btn btn-primary btn-sm" id="btn-pay-header">💳 Внести платіж</button>
  </div>
</div>

<div class="main">

  <div class="overview-grid" id="overview-grid"></div>

  <div class="progress-block">
    <div class="prog-header">
      <span style="font-size:13px;font-weight:500">Прогрес погашення</span>
      <span style="font-size:13px;font-weight:600;color:var(--accent);font-family:var(--mono)" id="prog-pct">0%</span>
    </div>
    <div class="prog-bar-full">
      <div class="prog-fill-full" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="prog-labels-full" id="prog-labels"></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="schedule">Графік платежів</div>
    <div class="tab" data-tab="history">Фактичні платежі</div>
  </div>

  <div id="tab-schedule">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Дата</th>
            <th>Платіж</th>
            <th>Тіло</th>
            <th>Відсотки</th>
            <th>Залишок</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody id="schedule-body"></tbody>
      </table>
      <div class="table-footer">
        <span id="schedule-info">—</span>
        <div class="pages" id="pages"></div>
      </div>
    </div>
    <div class="sum-grid">
      <div class="sum-card">
        <div class="sum-label">Загальна переплата</div>
        <div class="sum-val" style="color:var(--danger)" id="sum-total-interest">—</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">Вже сплачено відсотків</div>
        <div class="sum-val" style="color:var(--warning)" id="sum-paid-interest">—</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">Залишилось відсотків</div>
        <div class="sum-val" id="sum-future-interest">—</div>
      </div>
    </div>
  </div>

  <div id="tab-history" style="display:none">
    <div id="history-list"></div>
  </div>

</div>

<!-- МОДАЛКА ПЛАТЕЖУ -->
<div class="modal-overlay" id="pay-modal">
  <div class="modal">
    <div class="modal-title">💳 Внести платіж</div>
    <div class="field">
      <label>Сума <span class="req">*</span></label>
      <div class="input-wrap"><span class="input-prefix">₴</span>
        <input type="number" id="pay-amount" placeholder="0">
      </div>
    </div>
    <div class="field">
      <label>Дата</label>
      <input type="date" id="pay-date">
    </div>
    <div class="field">
      <label>Нотатка</label>
      <input type="text" id="pay-note" placeholder="необов'язково">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="pay-cancel">Скасувати</button>
      <button class="btn btn-primary" id="pay-confirm">Підтвердити</button>
    </div>
  </div>
</div>

<script src="scripts/calc.js"></script>
<script src="scripts/data.js"></script>
<script src="scripts/theme.js"></script>
<script src="scripts/loan-detail.js"></script>
</body>
</html>
