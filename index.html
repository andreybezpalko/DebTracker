<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Tracker</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div class="header">
  <a href="index.html" class="logo">
    <span class="logo-icon">💳</span> Loan Tracker
  </a>
  <div class="header-actions">
    <button class="theme-toggle" id="theme-toggle" title="Змінити тему">🌙</button>
    <a href="calc-installment.html" class="btn btn-ghost">🧮 Калькулятор</a>
    <a href="add.html" class="btn btn-primary">+ Додати кредит</a>
  </div>
</div>

<div class="main">

  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">Загальний борг</div>
      <div class="stat-value" id="stat-balance">₴ 0</div>
      <div class="stat-sub" id="stat-count">0 кредитів</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Платежів цього місяця</div>
      <div class="stat-value" id="stat-monthly">₴ 0</div>
      <div class="stat-sub" id="stat-monthly-sub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Статус</div>
      <div class="stat-value" style="font-size:15px;padding-top:4px" id="stat-overdue">Все гаразд</div>
    </div>
  </div>

  <div style="display:flex;align-items:center;margin-bottom:18px;gap:12px">
    <div class="nav-tabs" style="margin-bottom:0;flex-shrink:0">
      <button class="nav-tab active" data-filter="all">Всі</button>
      <button class="nav-tab" data-filter="active">Активні</button>
      <button class="nav-tab" data-filter="closed">Закриті</button>
    </div>
    <select id="sort-select" style="font-size:13px;padding:0 32px 0 12px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:var(--sans);font-weight:500;width:160px;flex-shrink:0;height:41px;line-height:41px;vertical-align:middle">
      <option value="date">За датою платежу</option>
      <option value="balance">За залишком</option>
      <option value="name">За назвою</option>
      <option value="rate">За ставкою</option>
    </select>
  </div>

  <div class="loans-grid" id="loans-grid"></div>

  <div style="margin-top:28px">
    <div class="section-head">
      <div class="section-title">Найближчі платежі</div>
    </div>
    <div id="upcoming-list"></div>
  </div>

</div>

<!-- МОДАЛКА ПЛАТЕЖУ -->
<div class="modal-overlay" id="pay-modal">
  <div class="modal">
    <div class="modal-title">💳 Внести платіж — <span id="pay-modal-name"></span></div>
    <div class="field">
      <label>Сума платежу <span class="req">*</span></label>
      <div class="input-wrap">
        <span class="input-prefix">₴</span>
        <input type="number" id="pay-amount-input" placeholder="0">
      </div>
    </div>
    <div class="field">
      <label>Дата платежу</label>
      <input type="date" id="pay-date-input">
    </div>
    <div class="field">
      <label>Нотатка (необов'язково)</label>
      <input type="text" id="pay-note-input" placeholder="напр. достроковий платіж">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="pay-cancel">Скасувати</button>
      <button class="btn btn-primary" id="pay-confirm">Підтвердити</button>
    </div>
  </div>
</div>

<!-- МОДАЛКА РЕДАГУВАННЯ -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">✏️ Редагувати кредит</div>
    <div class="field">
      <label>Назва</label>
      <input type="text" id="edit-name">
    </div>
    <div class="field">
      <label>Залишок боргу</label>
      <div class="input-wrap"><span class="input-prefix">₴</span>
        <input type="number" id="edit-balance">
      </div>
    </div>
    <div class="field">
      <label>Щомісячний платіж</label>
      <div class="input-wrap"><span class="input-prefix">₴</span>
        <input type="number" id="edit-payment">
      </div>
    </div>
    <div class="field">
      <label>Дата наступного платежу</label>
      <input type="date" id="edit-date">
    </div>
    <div class="field">
      <label>Коментар</label>
      <input type="text" id="edit-comment">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="edit-cancel">Скасувати</button>
      <button class="btn btn-primary" id="edit-confirm">Зберегти</button>
    </div>
  </div>
</div>

<script src="scripts/calc.js"></script>
<script src="scripts/data.js"></script>
<script src="scripts/theme.js"></script>
<script src="scripts/dashboard.js"></script>
</body>
</html>
